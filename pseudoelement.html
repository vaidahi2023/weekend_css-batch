<!-- 
pseudo element
firstletter 
firstline
marker
selection
after 
before -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box
        {
            height: 300px;
            width:300px;
            background-color: aqua;
        }
        .box::first-line
        {
            background-color: blueviolet;
        }
        .box::first-letter
        {
            background-color: yellow;
        }
        ::marker
        {
            color: red;
            font-size: x-large;
        }
        ::selection
        {
            background-color: coral;
        }
    </style>
</head>
<body>
    <div class="box">
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Sit quae autem quia odio sint at adipisci incidunt dolorum aut distinctio asperiores debitis fuga quisquam dolor, officiis, corrupti nisi laborum consectetur.</p>
    </div>
    <ul>
        <li>item</li>
        <li>item</li>
        <li>item</li>
    </ul>
</body>
</html>
