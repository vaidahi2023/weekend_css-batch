<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box
        {
            height: 300px;
            width:300px;
            background-color: aqua;
            border:2px solid black;
            position: absolute;
        }
        .box::after
        {
            height: 150px;
            width:300px;
            background-color: blueviolet;
            position: absolute;
            top:0px;
            left:0px;
            content: '';
        }
        .box::before
        {
            height: 150px;
            width:300px;
            background-color: blue;
            position: absolute;
            right: 0px;
            top:150px;
            content: '';
        }
        .box:hover::after
        {
            width: 0;
            height: 0;
            transition: all 2s;
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
