<!-- pseudo class
 active
 visited
 unvisited
 hover  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        a:active
        {
            background-color: aqua;
            font-size: 20px;
        }
        a:visited
        {
            background-color: blueviolet;
        }
        /* unvisited */
        a:link 
        {
            background-color: green;
        }
        a:hover{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <a href="https://www.msn.com/en-in/entertainment/bollywood">link</a>
</body>
</html>
